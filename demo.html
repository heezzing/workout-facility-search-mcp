<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MCP Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .header {
    text-align: center; margin-bottom: 32px;
    font-family: 'Apple SD Gothic Neo', sans-serif;
  }
  .header h1 { font-size: 28px; color: #f0f6fc; font-weight: 700; }
  .header p  { font-size: 15px; color: #8b949e; margin-top: 6px; }

  .window {
    width: 760px;
    background: #161b22;
    border-radius: 12px;
    border: 1px solid #30363d;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }

  .titlebar {
    background: #21262d;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #30363d;
  }
  .dot-r { width:12px; height:12px; border-radius:50%; background:#ff5f57; }
  .dot-y { width:12px; height:12px; border-radius:50%; background:#febc2e; }
  .dot-g { width:12px; height:12px; border-radius:50%; background:#28c840; }
  .title-text { margin-left: 8px; color: #8b949e; font-size: 13px; }

  .terminal {
    padding: 24px 28px;
    min-height: 380px;
    font-size: 14px;
    line-height: 1.7;
  }

  .line { opacity: 0; transform: translateY(4px); transition: opacity .25s, transform .25s; }
  .line.show { opacity: 1; transform: translateY(0); }

  .prompt { color: #3fb950; }
  .cmd    { color: #f0f6fc; }
  .comment{ color: #8b949e; font-style: italic; }
  .info   { color: #8b949e; }
  .tool   { color: #d2a8ff; font-weight: 600; }
  .result { color: #79c0ff; }
  .key    { color: #ffa657; }
  .val    { color: #a5d6ff; }
  .sep    { color: #30363d; }
  .answer { color: #56d364; }
  .warn   { color: #f0883e; }
  .cursor {
    display: inline-block; width: 9px; height: 15px;
    background: #58a6ff; vertical-align: middle;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 700; margin-right: 6px;
  }
  .badge-blue  { background:#1f6feb; color:#cae8ff; }
  .badge-green { background:#196127; color:#56d364; }
  .badge-red   { background:#7d2a1e; color:#ffa198; }

  .replay-btn {
    margin-top: 24px;
    background: #238636; color: #fff;
    border: none; border-radius: 8px;
    padding: 12px 32px; font-size: 15px;
    cursor: pointer; font-family: inherit;
    transition: background .2s;
  }
  .replay-btn:hover { background: #2ea043; }

  .progress-bar {
    height: 3px; background: #21262d;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #238636;
    width: 0%; transition: width .3s linear;
  }
</style>
</head>
<body>

<div class="header">
  <h1>workout-facility-search MCP 서버 데모</h1>
  <p>실시간 시설 검색 도구 · 병목 해결 전/후 비교</p>
</div>

<div class="window">
  <div class="titlebar">
    <div class="dot-r"></div>
    <div class="dot-y"></div>
    <div class="dot-g"></div>
    <div class="title-text">facility_search_server.py — demo</div>
  </div>
  <div class="terminal" id="terminal"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<button class="replay-btn" onclick="startDemo()">▶ 다시 재생</button>

<script>
const lines = [
  // 섹션 1: Before
  { delay: 0,    html: '<span class="comment"># ━━ Before: MCP 없이 (환각 발생) ━━━━━━━━━━━━━━━━━━━━━━━━</span>' },
  { delay: 600,  html: '<span class="prompt">$</span> <span class="cmd">python3 -c "from openai import OpenAI; ask(\'홍대 클라이밍 시설\')"</span>' },
  { delay: 1400, html: '<span class="info">⏳ Hermes 응답 중...</span>' },
  { delay: 2800, html: '<span class="warn">⚠ [MCP 없이] 홍대 클라이밍센터, 서교동 364-1, 02-334-1544</span>' },
  { delay: 3400, html: '<span class="warn">⚠ 락클라이밍 홍대점, 동교동 159-1, 02-325-1548</span>' },
  { delay: 3900, html: '<span class="red">✗ 실제로 존재하지 않는 시설 — 전형적인 환각(Hallucination)</span>' },
  { delay: 4700, html: '' },

  // 섹션 2: After
  { delay: 4900, html: '<span class="comment"># ━━ After: MCP 서버 적용 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>' },
  { delay: 5500, html: '<span class="prompt">$</span> <span class="cmd">python3 demo_react.py</span>' },
  { delay: 6200, html: '<span class="info">🤖 질문: 홍대 근처 클라이밍 시설 추천해줘</span>' },
  { delay: 7200, html: '<span class="info">   Hermes가 도구 필요 여부 판단 중...</span>' },
  { delay: 8400, html: '' },

  { delay: 8600, html: '<span class="tool">🔧 [1] search_nearby_facilities 호출</span>' },
  { delay: 9000, html: '    <span class="key">sport</span><span class="sep">:</span> <span class="val">"클라이밍"</span>  <span class="key">location</span><span class="sep">:</span> <span class="val">"홍대"</span>  <span class="key">max_results</span><span class="sep">:</span> <span class="val">5</span>' },
  { delay: 9600, html: '<span class="info">   DuckDuckGo 검색 중...</span>' },
  { delay: 11200,html: '<span class="result">📋 결과 수신 (5개 시설)</span>' },
  { delay: 11700,html: '   <span class="val">① 볼더프렌즈 클라이밍센터</span>  <span class="info">— 홍익로 25 서교빌딩 B3</span>' },
  { delay: 12000,html: '   <span class="val">② 애스트로맨 스포츠 클라이밍</span> <span class="info">— 성산동 572-99 순선빌딩 B1</span>' },
  { delay: 12300,html: '   <span class="val">③ 더클라임 클라이밍 홍대B점</span> <span class="info">— 다양한 강습 프로그램 운영</span>' },
  { delay: 12700,html: '' },

  { delay: 12900,html: '<span class="tool">🔧 [2] get_facility_detail 호출</span>' },
  { delay: 13300,html: '    <span class="key">url</span><span class="sep">:</span> <span class="val">"https://m.blog.naver.com/...볼더프렌즈..."</span>' },
  { delay: 14000,html: '<span class="info">   페이지 본문 추출 중...</span>' },
  { delay: 15400,html: '<span class="result">📋 상세 정보 수신</span>' },
  { delay: 15800,html: '   <span class="key">위치</span><span class="sep">:</span> <span class="val">홍대입구역 9번 출구 235m</span>' },
  { delay: 16100,html: '   <span class="key">영업시간</span><span class="sep">:</span> <span class="val">월~금 12:00-23:00 / 토일 10:00-21:00</span>' },
  { delay: 16400,html: '   <span class="key">주차</span><span class="sep">:</span> <span class="val">유료 (30분 3,000원)</span>' },
  { delay: 16800,html: '' },

  { delay: 17100,html: '<span class="info">   Hermes 최종 답변 생성 중...</span>' },
  { delay: 18500,html: '' },
  { delay: 18700,html: '<span class="answer">✅ 홍대 근처 클라이밍 시설 추천:</span>' },
  { delay: 19100,html: '<span class="answer">   1. 볼더프렌즈 클라이밍센터</span>' },
  { delay: 19300,html: '<span class="answer">      위치: 홍익로 25 서교빌딩 지하3층 (홍대입구역 9번 출구 235m)</span>' },
  { delay: 19500,html: '<span class="answer">      영업: 평일 12-23시, 주말 10-21시</span>' },
  { delay: 19800,html: '<span class="answer">   2. 애스트로맨 스포츠 클라이밍 센터</span>' },
  { delay: 20000,html: '<span class="answer">      위치: 마포구 성산동 572-99 순선빌딩 B1</span>' },
  { delay: 20300,html: '' },
  { delay: 20600,html: '<span class="comment"># 도구 2회 호출 → 실제 존재하는 시설 정확히 반환 ✓</span>' },
  { delay: 21400,html: '<span class="prompt">$</span> <span class="cursor"></span>' },
];

const TOTAL_MS = 22000;

function startDemo() {
  const terminal = document.getElementById('terminal');
  const progress = document.getElementById('progress');
  terminal.innerHTML = '';
  progress.style.width = '0%';

  lines.forEach(({ delay, html }) => {
    setTimeout(() => {
      if (html === '') {
        terminal.innerHTML += '<br>';
      } else {
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = html;
        terminal.appendChild(div);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => div.classList.add('show'));
        });
      }
      terminal.scrollTop = terminal.scrollHeight;
    }, delay);
  });

  // 프로그레스 바
  const start = Date.now();
  const tick = () => {
    const pct = Math.min(((Date.now() - start) / TOTAL_MS) * 100, 100);
    progress.style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

startDemo();
</script>
</body>
</html>
